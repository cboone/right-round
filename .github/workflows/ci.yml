name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: cboone/gh-actions/.github/workflows/go-ci.yml@v2.1.2
    with:
      go-version: "1.25.0"
      run-lint: true
      run-build: true
      test-flags: "-race -coverprofile=coverage.out"

  check-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Run tests with coverage
        run: go test ./... -race -coverprofile=coverage.out

      - name: Check coverage
        run: bash scripts/check-coverage.sh
